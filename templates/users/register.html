{% extends 'base.html' %}

{% block title %}Register - Tim-X{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-success text-white text-center py-3 rounded-top-4">
                <h4 class="mb-0 fw-bold">Register</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-medium rounded-pill">Register</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}"
                            class="text-decoration-none fw-bold text-success">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
