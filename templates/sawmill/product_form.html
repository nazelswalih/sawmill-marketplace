{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg border-0 rounded-4 mb-4">
            <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                <h4 class="mb-0 fw-bold">{{ title }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'inventory_list' %}"
                            class="btn btn-outline-secondary me-md-2 rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-secondary text-white text-center py-3 rounded-top-4">
                <h5 class="mb-0 fw-bold">Volume Calculator</h5>
            </div>
            <div class="card-body p-4">
                <form id="calc-form">
                    <div class="mb-3">
                        <label class="form-label text-muted">Length (ft)</label>
                        <input type="number" id="calc-length" class="form-control bg-light border-0" step="0.1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Width (in)</label>
                        <input type="number" id="calc-width" class="form-control bg-light border-0" step="0.1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Thickness (in)</label>
                        <input type="number" id="calc-thickness" class="form-control bg-light border-0" step="0.1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Quantity</label>
                        <input type="number" id="calc-qty" class="form-control bg-light border-0" value="1">
                    </div>
                    <button type="button" class="btn btn-success w-100 rounded-pill"
                        onclick="calculateBF()">Calculate</button>
                </form>
                <div class="mt-4 text-center p-3 bg-light rounded-3">
                    <h5 class="mb-0 text-muted">Result: <strong id="calc-result" class="text-primary">0</strong> BF</h5>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function calculateBF() {
        const length = document.getElementById('calc-length').value;
        const width = document.getElementById('calc-width').value;
        const thickness = document.getElementById('calc-thickness').value;
        const quantity = document.getElementById('calc-qty').value;

        fetch("{% url 'volume_calculator' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: `length=${length}&width=${width}&thickness=${thickness}&quantity=${quantity}`
        })
            .then(response => response.json())
            .then(data => {
                document.getElementById('calc-result').innerText = data.board_feet;
            });
    }
</script>
{% endblock %}
