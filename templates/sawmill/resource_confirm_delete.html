{% extends 'base.html' %}

{% block title %}Delete {{ model_name|title }} - Tim-X{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Confirm Delete</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the {{ model_name }} <strong>"{{ item }}"</strong>?</p>
                <p class="text-danger"><small>This action cannot be undone.</small></p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'manage_resources' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
