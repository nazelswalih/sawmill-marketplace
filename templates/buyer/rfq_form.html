{% extends 'base.html' %}

{% block title %}Request Quote{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">Request For Quote (RFQ)</div>
            <div class="card-body">
                <h5>Product: {{ product }}</h5>
                <p>Seller: {{ product.seller.business_name }}</p>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Submit RFQ</button>
                    <a href="{% url 'product_detail' product.id %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
